services:
  # ─── MySQL ──────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: vls-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-marzban_root_pass}
      MYSQL_DATABASE: marzban
      MYSQL_USER: marzban
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-marzban_pass}
    volumes:
      - vls_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Marzban (панель + Xray) ────────────────────────────
  marzban:
    image: gozargah/marzban:latest
    container_name: vls-marzban
    restart: unless-stopped
    ports:
      # Панель управления
      - "${MARZBAN_PANEL_PORT:-8000}:8000"
      # Прокси-порты (расширь под свои нужды)
      - "${XRAY_PORT_RANGE:-10080-10100}:10080-10100"
      - "443:443"
      - "8443:8443"
      - "2053:2053"
      - "2087:2087"
    command: >
      bash -c "
        alembic upgrade head;
        sed -i \"s/bind_args\\['host'\\] = '127.0.0.1'/bind_args['host'] = os.getenv('UVICORN_HOST', '0.0.0.0')/\" /code/main.py;
        python main.py
      "
    environment:
      SUDO_PASSWORD: ${MARZBAN_PASSWORD:-admin}
      SQLALCHEMY_DATABASE_URL: mysql+pymysql://marzban:${MYSQL_PASSWORD:-marzban_pass}@mysql:3306/marzban
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 8000
    volumes:
      - vls_marzban_data:/var/lib/marzban
    depends_on:
      mysql:
        condition: service_healthy

  # ─── vless-mgr (сборщик конфигов) ──────────────────────
  vless-mgr:
    build: .
    container_name: vls-collector
    restart: unless-stopped
    environment:
      BACKEND: marzban
      INBOUND_REMARK_PREFIX: ${INBOUND_REMARK_PREFIX:-[VLS-MGR]}
      INBOUND_PORT_MODE: auto
      # Marzban (внутри сети compose)
      MARZBAN_URL: http://marzban:8000
      MARZBAN_USERNAME: ${MARZBAN_USERNAME:-admin}
      MARZBAN_PASSWORD: ${MARZBAN_PASSWORD:-admin}
      # Пробинг
      PROBE_TIMEOUT: ${PROBE_TIMEOUT:-5}
      PROBE_CONCURRENCY: ${PROBE_CONCURRENCY:-20}
      # Интервал цикла
      INTERVAL: ${INTERVAL:-3600}
      # Логи
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      - marzban
    volumes:
      - ./data:/app/data

  # ─── HTTP-сервер подписок ──────────────────────────────
  sub-server:
    image: python:3.12-slim
    container_name: vls-subs
    restart: unless-stopped
    ports:
      - "${SUB_PORT:-8080}:8080"
    volumes:
      - ./data:/data
    command:
      - sh
      - -c
      - |
        cat > /server.py << 'PYEOF'
        import http.server, socketserver, os
        os.chdir("/data")
        class SubHandler(http.server.SimpleHTTPRequestHandler):
            def do_GET(self):
                if self.path == "/sub":
                    self.path = "/configs.txt"
                elif self.path == "/sub.json":
                    self.path = "/sub.json"
                elif self.path == "/best":
                    self.path = "/best.txt"
                if self.path.endswith(".json"):
                    self.send_response(200)
                    self.send_header("Content-Type", "application/json")
                    self.end_headers()
                    with open("/data/sub.json") as f:
                        self.wfile.write(f.read().encode())
                    return
                return super().do_GET()
        socketserver.TCPServer.allow_reuse_address = True
        httpd = socketserver.TCPServer(("0.0.0.0", 8080), SubHandler)
        print("Serving subs at http://0.0.0.0:8080/sub")
        httpd.serve_forever()
        PYEOF
        python /server.py

volumes:
  vls_mysql_data:
  vls_marzban_data:
